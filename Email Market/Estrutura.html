<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Email Marketing</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f4f4f4;">

    <!-- Tabela Principal (Container) -->
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="600"
        style="border-collapse: collapse; background-color: #ffffff;">

        <!-- Cabeçalho / Logo -->
        <tr>
            <td align="center" bgcolor="#333333" style="padding: 20px 0;">
                <img src="https://via.placeholder.com" alt="Sua Marca" width="150"
                    style="display: block; color: #ffffff;" />
            </td>
        </tr>

        <!-- Imagem Principal (Banner) -->
        <tr>
            <td align="center">
                <img src="https://via.placeholder.com" alt="Promoção Incrível" width="600"
                    style="display: block; width: 100%; max-width: 600px;" />
            </td>
        </tr>

        <!-- Conteúdo de Texto -->
        <tr>
            <td style="padding: 40px 30px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                        <td
                            style="color: #333333; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; padding-bottom: 20px;">
                            Olá, [Nome do Cliente]!
                        </td>
                    </tr>
                    <tr>
                        <td style="color: #666666; font-family: Arial, sans-serif; font-size: 16px; line-height: 24px;">
                            Este é um exemplo de estrutura de e-mail marketing. Use tabelas para garantir que tudo fique
                            no lugar certo, mesmo em celulares ou computadores antigos.
                        </td>
                    </tr>
                    <!-- Botão (CTA) -->
                    <tr>
                        <td align="center" style="padding: 30px 0 0 0;">
                            <a href="https://seusite.com"
                                style="background-color: #ff5500; color: #ffffff; padding: 15px 25px; text-decoration: none; border-radius: 5px; font-family: Arial, sans-serif; font-weight: bold; display: inline-block;">
                                APROVEITAR AGORA
                            </a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Rodapé -->
        <tr>
            <td bgcolor="#eeeeee"
                style="padding: 30px; text-align: center; color: #999999; font-family: Arial, sans-serif; font-size: 12px;">
                Você recebeu este e-mail porque se cadastrou em nossa lista.<br>
                <a href="#" style="color: #999999; text-decoration: underline;">Descadastrar (Unsubscribe)</a>
            </td>
        </tr>

    </table>
</body>

</html>
