<!doctype html>
<html lang="pt-BR">
  <head>
    <!--Tipo de texto padrão-->
    <meta charset="UTF-8">

    <!--Compatibilidade do navegador-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!--Escala de tela para responsivo-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9-dentista</title>
    <!-- Cor da barra mobile -->
    <!-- Cor para modo claro -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <!-- Cor para modo escuro (ex: cinza escuro do Tailwind) -->
    <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)">

    <!-- Para buscas no google-->
    <meta name="description" content="Exemplo de descrição para o meu site.">
    <meta name="keywords" content="palavras-chaves,separados,por,virgula">
    <meta name="author" content="Rafael Machado">
    <meta name="robots" content="index, follow">

    <!-- Configurações de Compartilhamento (SMO) -->
    <!-- Meta tags para compartilhamento do link nas redes sociais -->
    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://seusite.com.br">
    <meta property="og:title" content="Título Incrível do Meu Site">
    <meta property="og:description" content="Uma descrição curta que convence a pessoa a clicar.">
    <meta property="og:image" content="https://seusite.com.br/banner-compartilhamento.jpg">
    <!-- 1200 x 630 pixels, 1.91:1, abaixo de 300 KB, JPG ou PNG-->
    <!-- X (Antigo Twitter) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://seusite.com.br">
    <meta name="twitter:title" content="Título Incrível do Meu Site">
    <meta name="twitter:description" content="Uma descrição curta que convence a pessoa a clicar.">
    <meta name="twitter:image" content="https://seusite.com.br/banner-compartilhamento.jpg">
    <!-- 1200 x 630 pixels, 1.91:1, abaixo de 300 KB, JPG ou PNG-->
    <!--Teste para verificar o link site OpenGraph.xyz ou o Social Share Preview -->

    <!-- Inserir icone no navegador -->
    <!-- 1. Para abas do navegador (PC/Laptop) -->
    <link rel="icon" href="./favicon-32.png" sizes="32x32" type="image/png">
    <!-- 2. Para Android e Google Chrome (Alta resolução) -->
    <link rel="icon" href="./icon-192.png" sizes="192x192" type="image/png">
    <!-- 3. Exclusivo para iPhone/iPad (iOS) -->
    <link rel="apple-touch-icon" href="./apple-touch-180.png">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Pre-conexão de fontes do google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Evita que o Google te penalize se existirem duas URLs para o mesmo site (ex: com www e sem www). -->
    <link rel="canonical" href="https://seusite.com.br">

    

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://kit.fontawesome.com/ee3bb032cd.js" crossorigin="anonymous"></script>
  </body>
</html>
